<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>are you online</title>

<style>
* {
  font-family: Tahoma, sans-serif;
}

body {
  margin: 0;
  background: black;
  overflow: hidden;
}

/* ---------------- LOGIN ---------------- */
#login, #error {
  position: absolute;
  width: 100vw;
  height: 100vh;
  background: #0a246a;
  display: flex;
  align-items: center;
  justify-content: center;
}

.popup {
  width: 300px;
  background: #ece9d8;
  border: 2px solid #000;
  padding: 18px;
  text-align: center;
  box-shadow: 3px 3px 0 #000;
}

button {
  font-family: Tahoma;
  margin: 6px;
  padding: 4px 12px;
  cursor: pointer;
}

/* ---------------- DESKTOP ---------------- */
#desktop {
  display: none;
  width: 100vw;
  height: 100vh;
  background: black;
  position: relative;
}

/* ICON GRID (CLEAN XP STYLE) */
.icon {
  width: 90px;
  text-align: center;
  color: white;
  font-size: 11px;
  cursor: pointer;
  position: absolute;
}

.icon img {
  width: 48px;
  height: 48px;
  display: block;
  margin: 0 auto 4px auto;
}

/* ---------------- WINDOWS ---------------- */
.window {
  position: absolute;
  width: 420px;
  height: 280px;
  background: #ece9d8;
  border: 2px solid #0a246a;
  box-shadow: 4px 4px 0 #000;
  display: none;
}

.titlebar {
  height: 24px;
  background: linear-gradient(#0a246a, #3a6ea5);
  color: white;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 6px;
  font-size: 12px;
}

/* ---------------- TASKBAR ---------------- */
#taskbar {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 40px;
  background: #245edb;
  display: flex;
  align-items: center;
  justify-content: space-between;
  color: white;
  font-size: 12px;
}

#startBtn {
  background: #1c4fbf;
  padding: 6px 12px;
  cursor: pointer;
}

#clock {
  padding-right: 10px;
}

#startMenu {
  position: absolute;
  bottom: 40px;
  left: 0;
  width: 220px;
  background: #ece9d8;
  border: 2px solid #0a246a;
  display: none;
  padding: 10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="popup">
    <p>are you online?</p>
    <button onclick="enter()">yes</button>
    <button onclick="error()">no</button>
  </div>
</div>

<!-- ERROR -->
<div id="error" style="display:none">
  <div class="popup">
    <p>⚠ error 404: page not found</p>
    <button onclick="back()">retry</button>
  </div>
</div>

<!-- DESKTOP -->
<div id="desktop">

  <!-- ICONS (CLEAN XP GRID) -->
  <div class="icon" style="top:40px;left:40px" onclick="openWin('music')">
    <img src="https://cdn-icons-png.flaticon.com/512/727/727245.png">
    music
  </div>

  <div class="icon" style="top:140px;left:40px" onclick="openWin('merch')">
    <img src="https://cdn-icons-png.flaticon.com/512/107/107799.png">
    merchandise
  </div>

  <div class="icon" style="top:240px;left:40px" onclick="openWin('videos')">
    <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">
    videos
  </div>

  <div class="icon" style="top:340px;left:40px" onclick="openWin('photos')">
    <img src="https://cdn-icons-png.flaticon.com/512/685/685655.png">
    photos
  </div>

  <div class="icon" style="top:440px;left:40px" onclick="openWin('notepad')">
    <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png">
    notepad
  </div>

  <div class="icon" style="top:540px;left:40px" onclick="openWin('mail')">
    <img src="https://cdn-icons-png.flaticon.com/512/561/561127.png">
    mail
  </div>

  <!-- WINDOWS -->

  <div id="win-music" class="window">
    <div class="titlebar">music <button onclick="closeWin('music')">x</button></div>
    <iframe src="https://open.spotify.com/embed/artist/3MvnYhak5HxfnFfyl4pMH9" width="100%" height="250"></iframe>
  </div>

  <div id="win-merch" class="window">
    <div class="titlebar">merchandise <button onclick="closeWin('merch')">x</button></div>
    <iframe src="https://payhip.com/JessHumphries" width="100%" height="250"></iframe>
  </div>

  <div id="win-videos" class="window">
    <div class="titlebar">videos <button onclick="closeWin('videos')">x</button></div>
    <iframe src="https://youtube.com/@jjesshumphries" width="100%" height="250"></iframe>
  </div>

  <div id="win-photos" class="window">
    <div class="titlebar">photos <button onclick="closeWin('photos')">x</button></div>
    <iframe src="https://instagram.com/jess.humphries" width="100%" height="250"></iframe>
  </div>

  <div id="win-notepad" class="window">
    <div class="titlebar">notepad <button onclick="closeWin('notepad')">x</button></div>
    <textarea style="width:100%;height:250px;border:none;outline:none;font-family:Tahoma;">
if you were born so blameless then why were you born again?
    </textarea>
  </div>

  <div id="win-mail" class="window">
    <div class="titlebar">mail <button onclick="closeWin('mail')">x</button></div>
    <iframe src="https://6is3da.subscribepage.io/" width="100%" height="250"></iframe>
  </div>

  <!-- TASKBAR -->
  <div id="taskbar">
    <div id="startBtn" onclick="toggleStart()">start</div>

    <div id="startMenu">
      <b>Jess Humphries</b>
      <div>what did you expect</div>
    </div>

    <div id="clock">8:08</div>
  </div>

</div>

<script>
function enter(){
  document.getElementById('login').style.display='none';
  document.getElementById('desktop').style.display='block';
}

function error(){
  document.getElementById('login').style.display='none';
  document.getElementById('error').style.display='flex';
}

function back(){
  document.getElementById('error').style.display='none';
  document.getElementById('login').style.display='flex';
}

function openWin(id){
  document.getElementById('win-'+id).style.display='block';
}

function closeWin(id){
  document.getElementById('win-'+id).style.display='none';
}

function toggleStart(){
  let menu = document.getElementById('startMenu');
  menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
}

/* CLOCK (8:08 blinking colon) */
setInterval(()=>{
  let c = document.getElementById('clock');
  c.innerHTML = (c.innerHTML === "8:08") ? "8 08" : "8:08";
},1000);
</script>

</body>
</html>
